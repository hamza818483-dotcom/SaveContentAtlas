name: Watchdog

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        id: ping
        run: |
          URL="https://savecontentatlas.onrender.com"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Pinged $URL -> HTTP $STATUS"

      - name: Send Telegram alert if down
        if: steps.ping.outputs.status != '200'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.WATCHDOG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.WATCHDOG_CHAT_ID }}" \
            -d text="⚠️ SaveContentAtlas DOWN! HTTP status: ${{ steps.ping.outputs.status }} — https://savecontentatlas.onrender.com"
